<div class="flex w-full min-h-screen p-6 gap-6 " >
  <div class="w-2/3 flex flex-col items-center gap-2">
      <div class="flex gap-6">
        <select class="select select-primary " (change)="onBudgetSelected($event)" >
          <option disabled selected value="" >Sélectionner un budget</option>
          @for (budget of budgetsList; track budget.id) {
            <option [value]="budget.id">{{budget.name}}</option>
          }
        </select>


        <!-- The button to open modal -->
        <button class="btn btn-neutre" [routerLink]="['/budget/new']" >➕</button>

        <button class="btn btn-neutre" (click)="deleteBudget(selectedBudgetId)" [disabled]="selectedBudgetId == null"  >🗑️</button>

        <button class="btn btn-neutre" (click)="editBudget(selectedBudgetId)" [disabled]="selectedBudgetId == null">✏️</button>


      </div>

      <div class="overflow-x-auto flex-1 w-full ">

          @if (selectedBudget) {
            <table class="table table-xs ">
              <thead>
              <tr>
                <th class="w-2/5">Nom</th>
                <th class="w-2/5">Détail</th>
                <th class="w-1/5">Total</th>
              </tr>
              </thead>
              <tbody>
              <tr>
                <th class="w-2/5">{{selectedBudget.name}}</th>
                <th class="w-2/5">{{selectedBudget.detail}}</th>
                <th class="w-1/5">{{selectedBudget.balance}}</th>
              </tr>
              </tbody>
            </table>
          } @else {
          <h3 class="text-center m-2">Veuillez sélectionner un budget</h3>
        }
        <div>
          <app-transaction-list  ></app-transaction-list>
        </div>
      </div>
  </div >
